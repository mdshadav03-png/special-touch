<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Touch Store</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}
header{
  background:#000;
  color:#fff;
  padding:12px;
  text-align:center;
}
.top{
  background:#f8e7b5;
  padding:8px;
  text-align:center;
  font-size:14px;
}
.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}
.card{
  background:#fff;
  border-radius:10px;
  padding:10px;
}
.card img{
  width:100%;
  border-radius:10px;
}
.title{
  font-size:14px;
  margin:5px 0;
}
.price{
  color:#e91e63;
  font-weight:bold;
}
.old{
  text-decoration:line-through;
  color:#999;
  font-size:12px;
}
.btn{
  background:#ff5722;
  color:#fff;
  border:none;
  padding:6px;
  width:100%;
  border-radius:5px;
}
.cart{
  background:#fff;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
input{
  width:100%;
  padding:8px;
  margin:5px 0;
}
.order{
  background:#ff5722;
  color:#fff;
  padding:10px;
  border:none;
  width:100%;
  border-radius:5px;
}
.whatsapp{
  background:#25D366;
  color:#fff;
  padding:10px;
  border:none;
  width:100%;
  border-radius:5px;
  margin-top:5px;
}
</style>

</head>
<body>

<header>🛍️ Special Touch Store</header>

<div class="top">
✔ Free Delivery | ✔ Cash on Delivery | ✔ 7 Days Return
</div>

<div class="container" id="products"></div>

<div class="cart">
<h3>Total: ₹<span id="total">0</span></h3>

<input type="text" id="name" placeholder="Enter Full Name">
<input type="text" id="phone" placeholder="10 Digit Mobile Number">
<input type="text" id="address" placeholder="Full Address with Pincode">

<button class="order" onclick="orderNow()">Place Order (COD)</button>
<button class="whatsapp" onclick="whatsappOrder()">Order on WhatsApp</button>
</div>

<script>

let cart = [];
let total = 0;

// 👉 20+ Products List
let products = [
  {name:"Ladies Handbag", price:499, old:999, img:"https://via.placeholder.com/300"},
  {name:"Stylish Purse", price:399, old:799, img:"https://via.placeholder.com/300"},
  {name:"Designer Clutch", price:599, old:1199, img:"https://via.placeholder.com/300"},
  {name:"Shoulder Bag", price:699, old:1399, img:"https://via.placeholder.com/300"},
  {name:"Wallet Premium", price:299, old:599, img:"https://via.placeholder.com/300"},
  {name:"Fashion Bag", price:549, old:1099, img:"https://via.placeholder.com/300"},
  {name:"Party Clutch", price:499, old:999, img:"https://via.placeholder.com/300"},
  {name:"Travel Bag", price:799, old:1599, img:"https://via.placeholder.com/300"},
  {name:"Office Bag", price:699, old:1299, img:"https://via.placeholder.com/300"},
  {name:"Mini Purse", price:249, old:499, img:"https://via.placeholder.com/300"},
  {name:"Luxury Handbag", price:999, old:1999, img:"https://via.placeholder.com/300"},
  {name:"College Bag", price:599, old:1199, img:"https://via.placeholder.com/300"},
  {name:"Stylish Sling Bag", price:399, old:799, img:"https://via.placeholder.com/300"},
  {name:"Classic Wallet", price:199, old:399, img:"https://via.placeholder.com/300"},
  {name:"Party Bag", price:649, old:1299, img:"https://via.placeholder.com/300"},
  {name:"Leather Purse", price:549, old:1099, img:"https://via.placeholder.com/300"},
  {name:"Compact Clutch", price:449, old:899, img:"https://via.placeholder.com/300"},
  {name:"Daily Use Bag", price:499, old:999, img:"https://via.placeholder.com/300"},
  {name:"Premium Sling", price:699, old:1399, img:"https://via.placeholder.com/300"},
  {name:"Trendy Handbag", price:599, old:1199, img:"https://via.placeholder.com/300"}
];

// Show products
let container = document.getElementById("products");

products.forEach((p,i)=>{
  container.innerHTML += `
  <div class="card">
    <img src="${p.img}">
    <div class="title">${p.name}</div>
    <div class="price">₹${p.price} <span class="old">₹${p.old}</span></div>
    <button class="btn" onclick="addToCart(${i})">Add to Cart</button>
  </div>
  `;
});

function addToCart(i){
  cart.push(products[i]);
  total += products[i].price;
  document.getElementById("total").innerText = total;
}

// Normal order
function orderNow(){
  alert("Order Placed Successfully!");
}

// WhatsApp order
function whatsappOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let message = "Order Details:%0A";
  
  cart.forEach(p=>{
    message += p.name + " - ₹" + p.price + "%0A";
  });

  message += "Total: ₹" + total + "%0A";
  message += "Name: " + name + "%0A";
  message += "Phone: " + phone + "%0A";
  message += "Address: " + address;

  window.open("https://wa.me/917838657382?text=" + message);
}

</script>

</body>
</html>
