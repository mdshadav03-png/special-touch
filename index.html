<!DOCTYPE html>
<html>
<head>
<title>Special Touch Store</title>

<style>
body {font-family:sans-serif; margin:0; background:#f5f5f5;}

.header {
  background:black;
  color:white;
  text-align:center;
  padding:15px;
}

.top {
  background:#fff3cd;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card {
  background:white;
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.qty {
  display:flex;
  justify-content:center;
  margin-top:5px;
}

.qty button {
  padding:5px 10px;
  font-size:16px;
}

.cart {
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  padding:10px;
  width:100%;
  margin-top:5px;
  border:none;
  border-radius:8px;
  background:#ff5722;
  color:white;
}

.history {
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
}
</style>

</head>

<body>

<div class="header">🛍️ Special Touch Store</div>

<div class="top">
✔️ Free Delivery | ✔️ COD Available | ✔️ 7 Days Return
</div>

<div class="grid">

<!-- PRODUCT -->
<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<h3>Wallet ₹499</h3>

<div class="qty">
<button onclick="changeQty('Wallet',499,-1)">-</button>
<span id="Wallet">0</span>
<button onclick="changeQty('Wallet',499,1)">+</button>
</div>

<button onclick="buyNow('Wallet',499)">⚡ Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
<h3>Clutch ₹599</h3>

<div class="qty">
<button onclick="changeQty('Clutch',599,-1)">-</button>
<span id="Clutch">0</span>
<button onclick="changeQty('Clutch',599,1)">+</button>
</div>

<button onclick="buyNow('Clutch',599)">⚡ Buy Now</button>
</div>

</div>

<div class="cart">

<h2>Total: ₹<span id="total">0</span></h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<select id="payment">
<option>Cash on Delivery</option>
<option>UPI Payment</option>
<option>Scan QR</option>
</select>

<button onclick="placeOrder()">🛒 Order Now</button>
<button onclick="orderWhatsApp()">📲 Order on WhatsApp</button>

</div>

<div class="history">
<h3>Order History</h3>
<ul id="history"></ul>
</div>

<script>
let cart = {};
let total = 0;

function changeQty(name, price, change){
  if(!cart[name]) cart[name]=0;

  cart[name] += change;
  if(cart[name] < 0) cart[name]=0;

  document.getElementById(name).innerText = cart[name];
  calculateTotal();
}

function calculateTotal(){
  total = 0;
  for(let item in cart){
    if(item=="Wallet") total += cart[item]*499;
    if(item=="Clutch") total += cart[item]*599;
  }
  document.getElementById("total").innerText = total;
}

function buyNow(name, price){
  cart = {};
  cart[name] = 1;
  calculateTotal();
  alert("Product added. Click Order Now");
}

function generateOrderID(){
  return "ORD" + Math.floor(Math.random()*100000);
}

function placeOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let payment = document.getElementById("payment").value;

  if(!name || !phone || !address){
    alert("Fill details");
    return;
  }

  let orderID = generateOrderID();

  let details = `ID: ${orderID} | ${name} | ₹${total}`;

  let li = document.createElement("li");
  li.innerText = details;
  document.getElementById("history").appendChild(li);

  alert("Order Placed! ID: " + orderID);

  // PAYMENT ACTION
  if(payment=="UPI Payment"){
    window.location.href="upi://pay?pa=8745974437-3@ybl&am="+total;
  }

}

function orderWhatsApp(){
  let msg = "Order:\n";
  for(let item in cart){
    if(cart[item]>0){
      msg += item + " x" + cart[item] + "\n";
    }
  }
  window.open("https://wa.me/917838657382?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
