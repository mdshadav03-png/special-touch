<!DOCTYPE html>
<html>
<head>
<title>Special Touch Store</title>

<style>
body {font-family:sans-serif; background:#f2f2f2; margin:0;}

.header {
  padding:20px;
  text-align:center;
  background:#111;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

.card {
  background:white;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:12px;
}

.price {color:#ff5722; font-weight:bold;}

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.cart-btn {background:black; color:white;}
.whatsapp {background:#25D366; color:white;}
.buy {background:#ff5722; color:white;}

.cart {
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

.sticky-btn {
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  background:#25D366;
  color:white;
  padding:15px;
  text-align:center;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="header">
🛍️ Special Touch Store <br>
<small>Premium Bags</small>
</div>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<h3>Designer Ladies Wallet</h3>
<p class="price">₹499</p>
<button class="cart-btn" onclick="addToCart('Designer Ladies Wallet',499)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
<h3>Stylish Clutch Wallet</h3>
<p class="price">₹599</p>
<button class="cart-btn" onclick="addToCart('Stylish Clutch Wallet',599)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1590874103328-eac38a683ce7">
<h3>Premium Hand Bag</h3>
<p class="price">₹899</p>
<button class="cart-btn" onclick="addToCart('Premium Hand Bag',899)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585487000160-6ebcfceb0d03">
<h3>Embroidered Stylish Bag</h3>
<p class="price">₹999</p>
<button class="cart-btn" onclick="addToCart('Embroidered Stylish Bag',999)">Add to Cart</button>
</div>

</div>

<div class="cart">

<h2>Total: ₹<span id="total">0</span></h2>
<ul id="cartItems"></ul>

<h3>Enter Details</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="sendOrder()">📲 Order on WhatsApp</button>

<br><br>

<button onclick="payNow()">💳 Pay with UPI</button>

</div>

<div class="sticky-btn" onclick="sendOrder()">Order Now</div>

<script>
let total = 0;
let orders = [];

function addToCart(name, price){
  total += price;
  orders.push(name + " - ₹" + price);

  document.getElementById("total").innerText = total;

  let li = document.createElement("li");
  li.innerText = name + " - ₹" + price;
  document.getElementById("cartItems").appendChild(li);
}

function sendOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Please fill all details");
    return;
  }

  let msg = `Order Details:

Name: ${name}
Phone: ${phone}
Address: ${address}

Items:
${orders.join("\n")}

Total: ₹${total}`;

  window.open("https://wa.me/917838657382?text=" + encodeURIComponent(msg));

  // EMAIL SEND
  fetch("https://formsubmit.co/mdshadav03@gmail.com", {
    method: "POST",
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      name: name,
      phone: phone,
      address: address,
      order: orders.join(", "),
      total: total
    })
  });
}

function payNow(){
  let upi = "upi://pay?pa=8745974437-3@ybl&pn=SpecialStore&am=" + total;
  window.location.href = upi;
}
</script>

</body>
</html>
