<!DOCTYPE html>
<html>
<head>
<title>Special Touch Store</title>

<style>
body {font-family:sans-serif; background:#f2f2f2; margin:0;}

.header {
  padding:20px;
  text-align:center;
  background:#111;
  color:white;
}

.top {
  background:#fff3cd;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

.card {
  background:white;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:12px;
}

.price {color:#ff5722; font-weight:bold;}

.qty {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-top:5px;
}

.qty button {
  width:30px;
  height:30px;
  font-size:18px;
  background:black;
  color:white;
  border-radius:50%;
}

.cart {
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  background:#ff5722;
  color:white;
}

.whatsapp {background:#25D366;}
</style>

</head>

<body>

<div class="header">
🛍️ Special Touch Store
</div>

<div class="top">
✔️ Free Delivery | ✔️ Cash on Delivery | ✔️ 7 Days Return
</div>

<div class="grid">

<!-- PRODUCT -->
<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<h3>Wallet ₹499</h3>

<div class="qty">
<button onclick="changeQty('Wallet',499,-1)">-</button>
<span id="Wallet">0</span>
<button onclick="changeQty('Wallet',499,1)">+</button>
</div>

</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
<h3>Clutch ₹599</h3>

<div class="qty">
<button onclick="changeQty('Clutch',599,-1)">-</button>
<span id="Clutch">0</span>
<button onclick="changeQty('Clutch',599,1)">+</button>
</div>

</div>

</div>

<div class="cart">

<h2>Total: ₹<span id="total">0</span></h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">🛒 Order Now</button>
<button class="whatsapp" onclick="orderWhatsApp()">📲 Order on WhatsApp</button>

</div>

<script>
let cart = {};
let total = 0;

function changeQty(name, price, change){
  if(!cart[name]) cart[name]=0;

  cart[name] += change;
  if(cart[name] < 0) cart[name]=0;

  document.getElementById(name).innerText = cart[name];
  calculateTotal();
}

function calculateTotal(){
  total = 0;
  for(let item in cart){
    if(item=="Wallet") total += cart[item]*499;
    if(item=="Clutch") total += cart[item]*599;
  }
  document.getElementById("total").innerText = total;
}

function placeOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Fill all details");
    return;
  }

  let items = "";
  for(let item in cart){
    if(cart[item] > 0){
      items += item + " x" + cart[item] + "\n";
    }
  }

  let msg = `Order Details:

Name: ${name}
Phone: ${phone}
Address: ${address}

Items:
${items}

Total: ₹${total}`;

  // WHATSAPP
  window.open("https://wa.me/917838657382?text="+encodeURIComponent(msg));

  // EMAIL FIX (IMPORTANT)
  let form = document.createElement("form");
  form.action = "https://formsubmit.co/mdshadav03@gmail.com";
  form.method = "POST";

  let input = document.createElement("input");
  input.type = "hidden";
  input.name = "message";
  input.value = msg;

  form.appendChild(input);
  document.body.appendChild(form);
  form.submit();

  alert("Order Sent Successfully!");
}

function orderWhatsApp(){
  let msg = "Order:\n";
  for(let item in cart){
    if(cart[item]>0){
      msg += item + " x" + cart[item] + "\n";
    }
  }
  window.open("https://wa.me/917838657382?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
