<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Touch Store</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
header{background:#000;color:#fff;text-align:center;padding:12px;}
.top{background:#f8e7b5;text-align:center;padding:8px;font-size:14px;}

.container{padding:10px;}
.card{background:#fff;border-radius:10px;margin-bottom:15px;padding:10px;}
.card img{width:100%;border-radius:10px;}

.title{font-size:16px;font-weight:bold;margin:5px 0;}
.price{color:#e91e63;font-size:18px;}
.old{text-decoration:line-through;color:#888;font-size:13px;}

.select{width:100%;padding:6px;margin:5px 0;}
.btn{background:#ff5722;color:#fff;border:none;padding:8px;width:100%;border-radius:5px;}

.cart{background:#fff;margin:10px;padding:10px;border-radius:10px;}
input{width:100%;padding:8px;margin:5px 0;}
.order{background:#ff5722;color:#fff;padding:10px;border:none;width:100%;border-radius:5px;}
.whatsapp{background:#25D366;color:#fff;padding:10px;border:none;width:100%;border-radius:5px;margin-top:5px;}
</style>

</head>
<body>

<header>🛍️ Special Touch Store</header>

<div class="top">
✔ Free Delivery | ✔ Cash on Delivery | ✔ 7 Days Return
</div>

<div class="container">

<!-- EMBROIDERED -->
<div class="card">
<img src="https://i.imgur.com/8Km9tLL.png">
<div class="title">Premium Embroidered Handbag</div>
<div class="price">₹799 <span class="old">₹1499</span></div>

<select class="select" id="embroideredColor">
<option>Black</option>
<option>Yellow</option>
<option>White</option>
<option>Pink</option>
<option>Brown</option>
</select>

<button class="btn" onclick="add('Embroidered Handbag')">Add to Cart</button>
</div>

<!-- PLAIN -->
<div class="card">
<img src="https://i.imgur.com/jhV6K9W.png">
<div class="title">Classic Plain Handbag</div>
<div class="price">₹799 <span class="old">₹1499</span></div>

<select class="select" id="plainColor">
<option>Brown</option>
<option>Light Brown</option>
<option>Green</option>
<option>Pink</option>
</select>

<button class="btn" onclick="add('Plain Handbag')">Add to Cart</button>
</div>

<!-- PARTY -->
<div class="card">
<img src="https://i.imgur.com/1Q9Z1Zm.png">
<div class="title">Designer Party Handbag</div>
<div class="price">₹799 <span class="old">₹1599</span></div>

<select class="select" id="partyColor">
<option>Golden</option>
<option>Pink</option>
</select>

<button class="btn" onclick="add('Party Handbag')">Add to Cart</button>
</div>

</div>

<!-- CART -->
<div class="cart">
<h3>Total: ₹<span id="total">0</span></h3>

<input type="text" id="name" placeholder="Enter Full Name">
<input type="text" id="phone" placeholder="10 Digit Mobile Number">
<input type="text" id="address" placeholder="Full Address with Pincode">

<button class="order">Place Order (COD)</button>
<button class="whatsapp" onclick="sendWhatsApp()">Order on WhatsApp</button>
</div>

<script>
let cart=[];
let total=0;

function add(product){
  cart.push(product);
  total+=799;
  document.getElementById("total").innerText=total;
}

function sendWhatsApp(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let msg="Order Details:%0A";

cart.forEach(p=>{
msg+=p+" - ₹799%0A";
});

msg+="Total: ₹"+total+"%0A";
msg+="Name: "+name+"%0A";
msg+="Phone: "+phone+"%0A";
msg+="Address: "+address;

window.open("https://wa.me/917838657382?text="+msg);
}
</script>

</body>
</html>
